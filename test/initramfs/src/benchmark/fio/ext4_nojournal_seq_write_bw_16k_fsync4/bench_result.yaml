alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: fio -filename=/ext4/fio-test -size=1G -bs=16K -direct=1 -fsync=4 (no journal)
  legend: Average file write bandwidth on {system}
  title: '[Ext4] The bandwidth of sequential writes (bs=16K, fsync=4, no journal)'
  unit: MB/s
result_extraction:
  result_index: 2
  search_pattern: bw=[0-9]+
