alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: fio -filename=/dev/vda -size=1G -bs=1M -direct=1
  legend: Average raw device write bandwidth on {system}
  title: '[Raw] The bandwidth of sequential writes'
  unit: MB/s
result_extraction:
  result_index: 2
  search_pattern: bw=[0-9]+
