alert:
  bigger_is_better: false
  threshold: 125%
chart:
  description: lat_syscall fstat /ext4/test_file
  legend: Average fstat latency on {system}
  title: '[Ext4 VFS] The cost of fstat'
  unit: "\xB5s"   # Unicode for microsecond
result_extraction:
  result_index: 3
  search_pattern: 'Simple fstat: +[0-9.]+'

runtime_config:
  aster_scheme: null
