alert:
  bigger_is_better: false
  threshold: 125%
chart:
  description: lat_syscall open /ext4/testfile
  legend: Average open latency on {system}
  title: '[Ext4 VFS] The cost of open+close'
  unit: "\xB5s"   # Unicode for microsecond
result_extraction:
  result_index: 3
  search_pattern: 'Simple open\/close: +[0-9.]+'

runtime_config:
  aster_scheme: null
