alert:
  bigger_is_better: true
  threshold: 125%
chart:
  description: lat_fs -s 0k /ext4
  legend: Number of created/deleted files on {system}
  title: '[Ext4] The throughput of creating/deleting small files (0KB)'
  unit: number
result_extraction:
  result_index: 3
  search_pattern: ^0k\t[0-9]+

runtime_config:
  aster_scheme: null
