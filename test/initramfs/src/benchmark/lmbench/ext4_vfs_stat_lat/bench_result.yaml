alert:
  bigger_is_better: false
  threshold: 125%
chart:
  description: lat_syscall stat /ext4/testfile
  legend: Average stat latency on {system}
  title: '[Ext4 VFS] The cost of stat'
  unit: "\xB5s"   # Unicode for microsecond
result_extraction:
  result_index: 3
  search_pattern: 'Simple stat: +[0-9.]+'

runtime_config:
  aster_scheme: null
